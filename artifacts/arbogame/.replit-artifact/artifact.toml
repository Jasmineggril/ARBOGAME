kind = "web"
previewPath = "/"
title = "Arbogame"
version = "1.0.0"
id = "artifacts/arbogame"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18537

[services.development]
run = "pnpm --filter @workspace/arbogame run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arbogame", "run", "build" ]
publicDir = "artifacts/arbogame/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18537"
BASE_PATH = "/"
